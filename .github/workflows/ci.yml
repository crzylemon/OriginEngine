name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc make \
            libvulkan-dev libglfw3-dev \
            libode-dev \
            libgtk-3-dev \
            glslang-tools

      - name: Compile shaders
        run: make shaders

      - name: Build engine
        run: make engine

      - name: Build editor
        run: make editor

      - name: Build demo game
        run: make game
